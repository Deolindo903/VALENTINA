
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva Confirmada</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Georgia, serif;
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.1);
    max-width:600px;
}

h1{
    margin-bottom:20px;
    color:#222;
}

p{
    font-size:18px;
    line-height:1.7;
    color:#444;
    margin-bottom:30px;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#sim{
    background:#222;
    color:white;
    margin-right:10px;
}

#nao{
    background:#ddd;
}

</style>
</head>

<body>

<div class="container">

    <h1>Olá, senhorita Valentina Graff.</h1>

    <p>
        Entramos em contato para confirmar sua reserva para sábado à noite.
        <br><br>
        Podemos contar com sua presença?
    </p>

    <button id="sim">Sim</button>
    <button id="nao">Não</button>

</div>

<script>

const nao = document.getElementById("nao");

function fugir(){

    const largura = window.innerWidth - 120;
    const altura = window.innerHeight - 80;

    nao.style.position = "absolute";
    nao.style.left = Math.random() * largura + "px";
    nao.style.top = Math.random() * altura + "px";
}

nao.addEventListener("mouseover", fugir);
nao.addEventListener("click", fugir);

document.getElementById("sim").addEventListener("click", function(){

document.querySelector(".container").innerHTML = `
<h1>Reserva confirmada.</h1>

<p>
Perfeito.
<br><br>
Então sábado eu te busco às 20h.
</p>
`;

});

</script>

</body>
</html>
